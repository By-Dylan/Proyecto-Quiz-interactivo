    <!--modal login: -->
    <div class="modal fade" id="modalComentarios" tabindex="-1" aria-labelledby="modalComentariosLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content text-dark">
                <form>
                <div class="modal-header fondo-titulo">
                    <p class="fw-bold titulo-sesion mb-0" id="modalComentariosLabel">Registrate</p>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body">
                    <label for="loginUser" class="form-label fw-bold">Usuario</label>
                    <input type="text" class="form-control form-control-sm mb-3" id="loginUser" placeholder="Nombre de usuario" required>
                    
                    <label for="loginEmail" class="form-label fw-bold">Correo electrónico</label>
                    <input type="email" class="form-control form-control-sm mb-3" id="loginEmail" placeholder="Correo existente" required>
                    
                    <label for="loginPassword" class="form-label fw-bold">Contraseña</label>
                    <input type="password" class="form-control form-control-sm mb-3" id="loginPassword" placeholder="Contraseña" required>
                </div>
                
                <div class="modal-footer color-btn">
                    <div class="d-grid gap-2 col-10 mx-auto">
                    <button type="submit" class="btn btn-danger btn-md">Enviar</button>
                    </div>
                </div>
                </form>
            </div>
        </div>
